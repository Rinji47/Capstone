{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Post - BlogHub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-exclamation-triangle" style="color: #dc3545; font-size: 3rem; margin-bottom: 1rem;"></i>
            <h1>Delete Post</h1>
            <p>Are you sure you want to delete this post?</p>
        </div>

        <div class="post-preview"
            style="text-align: left; margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 8px;">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content|striptags|truncatewords:20 }}</p>
        </div>

        <form method="post" action="{% url 'delete_post' post.id %}"
            style="display: flex; gap: 15px; margin-top: 20px;">
            {% csrf_token %}
            <a href="{% url 'profile' request.user.username %}" class="auth-button"
                style="background: #6c757d; text-align: center; text-decoration: none;">Cancel</a>
            <button type="submit" class="auth-button" style="background: #dc3545;">Delete Post</button>
        </form>
    </div>
</div>
{% endblock %}
